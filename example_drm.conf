# lcd2 - DRM example configuration
#
# Quick start:
#   make && ./lcd2 -c example_drm.conf
#
# Requirements:
#   - A DRM/KMS capable display (most modern GPUs and embedded systems)
#   - libgd, libdrm, libfreetype installed
#   - Font at the path specified below (adjust if needed)
#
# Config value quoting rules:
#   - Simple words  (driver, ttf, left ...)  can be unquoted; they are
#     auto-treated as string literals.
#   - Paths         (/dev/..., /usr/...)      MUST be quoted: '/dev/...'
#   - Hex colors starting with a digit        MUST be quoted: '44cc44'
#   - All-letter hex colors (ffffff, aaaaaa)  can be unquoted.
#   - Expressions   (cpu::load(), strftime()) are always unquoted.
#   - Numbers       (1000, 0, 100)            are always unquoted.
#
# All built-in plugins load automatically. Available expression functions:
#   cpu::load()            - total CPU load, 0-100
#   mem::used('mb'|'%')    - RAM used, in MB or percent
#   mem::total('mb')       - total RAM in MB
#   uptime()               - uptime as days/hours/minutes (no seconds)
#   uptime::long()         - uptime with seconds (use update 1000 for accuracy)
#   uname::hostname()      - system hostname
#   strftime(fmt, time())  - formatted date/time string
#   format(value, digits)  - number formatted to N decimal places
#
# Widget types: ttf, bar, linechart, curvechart, image, gauge, clock
#
# TTF options:  shadow 1, shadowcolor '222222', shadowoffset 2
#               outline 1, outlinecolor '000000'
# BAR options:  colorend 'aabb00'  (gradient from color to colorend)
#               border 1, bordercolor '44cc44'
# LINECHART/CURVECHART options: gridlines 4, gridcolor '333333'
# GAUGE options: fgcolor, trackcolor, bgcolor, linewidth, startangle, sweepangle
#               low, high, colorlow, colorhigh, needle 1, needlecolor
# CLOCK options: facecolor, rimcolor, hourcolor, minutecolor, secondcolor
#               tickcolor, ticks 1, minuteticks 0, handwidth

display {
    driver  drm
    device  '/dev/dri/card0'
    # width and height are auto-detected from the connected display
    # backlight 5     # optional: backlight level 0-10 (default 5)
    # backlight_path auto      # auto: detect from /sys/class/backlight (default)
    # backlight_path disabled  # disabled: no backlight control (USB displays etc.)
    # backlight_path '/sys/class/backlight/intel_backlight'  # explicit sysfs path
}

# -----------------------------------------------------------------------
# Widgets
# -----------------------------------------------------------------------

widget:w_clock {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    40
    color   ffffff
    text    strftime('%H:%M:%S', time())
    update  1000
    reload  1
}

widget:w_date {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    16
    color   999999
    text    strftime('%A  %d %B %Y', time())
    update  60000
    reload  1
}

widget:w_hostname {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    14
    color   '88aaff'
    text    uname::hostname() . '  (' . uname::machine() . ')'
}

widget:w_cpu_label {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    14
    color   cccccc
    text    'CPU   ' . format(cpu::load(), 1) . ' %'
    update  1000
    reload  1
}

widget:w_cpu_bar {
    type      bar
    value     cpu::load()
    min       0
    max       100
    width     460
    height    14
    color     '44cc44'
    colorhigh ff4444
    high      80
    bgcolor   '2a2a2a'
    # border 1              # optional: draw a 1-pixel border around the full bar area
    # bordercolor '44cc44'  # optional: border color (defaults to bar color)
    update    1000
    reload    1
}

widget:w_mem_label {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    14
    color   cccccc
    text    'MEM  ' . format(mem::used('mb'), 0) . ' / ' . format(mem::total('mb'), 0) . ' MB'
    update  3000
    reload  1
}

widget:w_mem_bar {
    type      bar
    value     mem::used('percent')
    min       0
    max       100
    width     460
    height    14
    color     '4488ff'
    colorhigh ff8844
    high      85
    bgcolor   '2a2a2a'
    update    3000
    reload    1
}

widget:w_uptime {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    12
    color   666666
    text    'Up: ' . uptime()
    update  60000
    reload  1
}

# curvechart: smooth Catmull-Rom curve over the last N samples.
# 'samples' controls how many data points are kept; fewer samples than
# width means each point spans multiple pixels, producing a visible
# smooth wave. 60 samples over 460 pixels = ~7.7 px/sample.
widget:w_cpu_curve {
    type      curvechart
    value     cpu::load()
    min       0
    max       100
    samples   60
    width     460
    height    50
    fgcolor   '44cc44'
    fgcolor2  '1a441a'
    bgcolor   111111
    fill      1
    update    1000
    reload    1
}

# -----------------------------------------------------------------------
# Layout - place widgets on the screen
#
# Coordinates are x,y from the top-left corner (pixels).
# Widgets placed directly inside a page (without an explicit layer block)
# are assigned to layer 0 automatically.
# -----------------------------------------------------------------------

layout {
    default 0

    page:0 {
        w_clock       20,14
        w_date        20,68
        w_hostname    20,96

        w_cpu_label   20,132
        w_cpu_bar     20,154

        w_mem_label   20,184
        w_mem_bar     20,206

        w_uptime      20,238

        w_cpu_curve   20,264
    }
}
