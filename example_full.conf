# lcd2 — comprehensive feature demo / example configuration
#
#   ./lcd2 -c example_full.conf
#
# Exercises every widget type (ttf, bar, linechart, curvechart, gauge, clock,
# image), three rotating pages plus a goodbye page, layers, on_enter/on_exit
# timers, conditional timers, sequence-driven page rotation, thresholds,
# gradients, ttf shadow/outline, gauge needle, conditional visibility, and a
# broad spread of plugin + built-in expression functions.
#
# The layout targets a ~480x320 area; on a larger display it occupies the
# top-left region. Adjust 'device', widget sizes and coordinates to taste.
# See docs/CONFIGURATION.md, docs/WIDGETS.md and docs/PLUGINS.md for details.


display {
    driver       drm
    device       '/dev/dri/card0'
    orientation  0
    foreground   ffffff
    background   '000000'
    basecolor    '000000'
    backlight    5
}

# ----------------------------------------------------------------------
# Timers: page rotation + on_enter/on_exit logging + a conditional timer
# ----------------------------------------------------------------------

timer:rotate {
    interval 4000
    action   page::next()
}

timer:enter_log {
    action log('demo: entered a page')
}

timer:exit_log {
    action log('demo: left a page')
}

# Conditional action: only logs when CPU load is high
timer:cpu_watch {
    interval  2000
    condition cpu::load() > 70
    action    log('demo: CPU is busy')
}

# ----------------------------------------------------------------------
# Page 0 widgets — "System"
# ----------------------------------------------------------------------

widget:title0 {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    26
    color   'ffffff'
    text    'SYSTEM'
    shadow       1
    shadowcolor  '222222'
    shadowoffset 2
    outline      1
    outlinecolor '000000'
}

widget:hostline {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    14
    color   '88aaff'
    text    to_upper(uname::hostname()) . '  ' . uname::machine() . '  k' . uname::release()
}

widget:cpu_label {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    14
    color   'cccccc'
    text    'CPU ' . format(cpu::load(), 1) . '%   ' . cpu::info('bogomips')
    update  1000
    reload  1
}

widget:cpu_bar {
    type      bar
    value     cpu::load()
    min       0
    max       100
    bgcolor   '1a1a1a'
    width     300
    direction east
    height    18
    color     '44cc44'
    colorend  ffcc00
    high      80
    colorhigh ff4444
    low       5
    colorlow  '335533'
    border    1
    bordercolor '666666'
    update    1000
    reload    1
}

# Conditional visibility — only shown while CPU load is above 50%
widget:cpu_hot {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    13
    color   'ff5555'
    text    'HIGH LOAD'
    visible cpu::load() > 50
    update  1000
    reload  1
}

widget:cpu_curve {
    type      curvechart
    value     cpu::load()
    min       0
    max       100
    samples   48
    width     300
    height    70
    fgcolor   '44cc44'
    fgcolor2  '1a441a'
    bgcolor   '111111'
    fill      1
    smooth    20
    gridlines 4
    gridcolor '333333'
    update    1000
    reload    1
}

widget:cpu_gauge {
    type        gauge
    value       cpu::load()
    min         0
    max         100
    width       110
    height      110
    fgcolor     '44cc44'
    bgcolor     '111111'
    linewidth   14
    startangle  135
    sweepangle  270
    high        80
    colorhigh   ff4444
    needle      1
    needlecolor ffffff
    update      1000
    reload      1
}

# ----------------------------------------------------------------------
# Page 1 widgets — "Network & Disk"
# ----------------------------------------------------------------------

widget:title1 {
    type  ttf
    font  '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size  26
    color 'ffffff'
    text  'NET / DISK'
    shadow 1
    shadowcolor '222222'
}

widget:net_state {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    14
    color   'cccccc'
    text    'eth0: ' . to_upper(netinfo::operstate('eth0')) . '  ' . netinfo::ip4addr('eth0')
    update  3000
    reload  1
}

widget:net_mac {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    12
    color   '888888'
    text    'MAC ' . netinfo::hwaddr('eth0') . '   MTU ' . netinfo::mtu('eth0')
    update  5000
    reload  1
}

widget:net_traffic {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    13
    color   '88ccff'
    text    'RX ' . netinfo::rx::bytes('eth0') . '   TX ' . netinfo::tx::bytes('eth0')
    update  2000
    reload  1
}

widget:mem_label {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    13
    color   'cccccc'
    text    'MEM ' . format(mem::used('mb'), 0) . '/' . format(mem::total('mb'), 0) . ' MB (' . format(mem::used('percent'), 0) . '%)'
    update  2000
    reload  1
}

widget:mem_bar {
    type      bar
    value     mem::used('percent')
    min       0
    max       100
    bgcolor   '1a1a1a'
    width     300
    direction east
    height    16
    color     '4488ff'
    high      85
    colorhigh ff8844
    update    2000
    reload    1
}

widget:disk_label {
    type    ttf
    font    '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size    13
    color   'cccccc'
    text    'DISK / ' . fs::used::hr('/') . ' / ' . fs::size::hr('/') . '  free ' . fs::free::hr('/')
    update  5000
    reload  1
}

widget:mem_line {
    type      linechart
    value     mem::used('percent')
    min       0
    max       100
    width     300
    height    50
    fgcolor   '4488ff'
    fgcolor2  '162844'
    bgcolor   '111111'
    gridlines 3
    smooth    15
    update    1000
    reload    1
}

# ----------------------------------------------------------------------
# Page 2 widgets — "Clock & Image" (with layers)
# ----------------------------------------------------------------------

widget:bgfill {
    type   bar
    value  100
    min    0
    max    100
    bgcolor   '101018'
    width  480
    height 320
    color  '101018'
    direction east
}

widget:analog {
    type        clock
    width       150
    height      150
    facecolor   '1a1a2a'
    rimcolor    '666688'
    hourcolor   ffffff
    minutecolor cccccc
    secondcolor ff4444
    tickcolor   '888888'
    ticks       1
    minuteticks 1
    handwidth   3
    update      1000
    reload      1
}

widget:digital {
    type   ttf
    font   '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size   34
    color  'ffffff'
    text   strftime('%H:%M:%S', time())
    align  center
    width  280
    shadow 1
    shadowcolor '224422'
    shadowoffset 2
    update 1000
    reload 1
}

widget:daterow {
    type   ttf
    font   '/usr/share/fonts/Adwaita/AdwaitaMono-Regular.ttf'
    size   15
    color  '99bbdd'
    text   strftime('%A %d.%m.%Y', time()) . '   up ' . uptime()
    align  center
    width  280
    update 30000
    reload 1
}

widget:logo {
    type    image
    file    'images/lcd2.png'
    scale   0.5
    center  1
}

# ----------------------------------------------------------------------
# Layout
# ----------------------------------------------------------------------

layout {
    default  0
    sequence 0,1,2

    timers [
        rotate
        cpu_watch
    ]

    page:0 {
        on_enter enter_log
        on_exit  exit_log

        title0     20,12
        hostline   20,48
        cpu_label  20,76
        cpu_bar    20,98
        cpu_hot    330,98
        cpu_curve  20,128
        cpu_gauge  350,150
    }

    page:1 {
        on_enter enter_log

        title1      20,12
        net_state   20,52
        net_mac     20,74
        net_traffic 20,94
        mem_label   20,124
        mem_bar     20,144
        disk_label  20,168
        mem_line    20,196
    }

    page:2 {
        layer:0 {
            bgfill   0,0
        }
        layer:1 {
            analog    20,90
            digital   180,70
            daterow   180,120
            logo      0,160
        }
    }

    goodbye {
        digital 90,140
    }
}
